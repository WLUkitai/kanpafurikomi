<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>振込先情報（コピー用）</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f7;
      padding: 20px;
      line-height: 1.6;
    }

    h1 {
      font-size: 1.3rem;
      margin-bottom: 20px;
    }

    .item {
      background: #fff;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .label {
      font-weight: bold;
    }

    button {
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.9rem;
    }

    button:active {
      opacity: 0.7;
    }

    .allcopy {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      font-size: 1rem;
    }
  </style>
</head>

<body>

<h1>振込先情報（コピー用）</h1>

<div class="item">
  <span><span class="label">銀行名：</span>三菱UFJ銀行</span>
  <button onclick="copyText('三菱UFJ銀行')">コピー</button>
</div>

<div class="item">
  <span><span class="label">銀行コード：</span>0005</span>
  <button onclick="copyText('0005')">コピー</button>
</div>

<div class="item">
  <span><span class="label">支店名：</span>京都中央支店</span>
  <button onclick="copyText('京都中央支店')">コピー</button>
</div>

<div class="item">
  <span><span class="label">支店コード：</span>501</span>
  <button onclick="copyText('501')">コピー</button>
</div>

<div class="item">
  <span><span class="label">口座種別：</span>普通</span>
  <button onclick="copyText('普通')">コピー</button>
</div>

<div class="item">
  <span><span class="label">口座番号：</span>2579055</span>
  <button onclick="copyText('2579055')">コピー</button>
</div>

<div class="item">
  <span><span class="label">口座名義：</span>ワコールロウドウクミアイ</span>
  <button onclick="copyText('ワコールロウドウクミアイ')">コピー</button>
</div>


<script>
  function copyText(text) {
    navigator.clipboard.writeText(text).then(
      () => alert("コピーしました"),
      () => alert("コピーできませんでした")
    );
  }

  function copyAll() {
    const allText =
`三菱UFJ銀行
京都中央支店
普通 2579055
ワコールロウドウクミアイ`;

    copyText(allText);
  }
</script>

</body>
</html>
